<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <title>OTD Executive Analysis - Com Filtro de Complexo</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #4f46e5; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-upload { background: var(--accent); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; display: inline-block; }
        
        .filter-section { 
            background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; 
            margin-bottom: 25px; display: flex; gap: 20px; align-items: center;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; min-width: 250px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .stat-card.active { border: 2px solid var(--accent); background: #f5f3ff; }
        .stat-label { font-size: 12px; font-weight: 700; color: #64748b; }
        .stat-value { font-size: 32px; font-weight: 800; margin-top: 8px; }

        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .scroll-area { max-height: 600px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: white; padding: 12px; text-align: left; font-size: 11px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .badge-compliant { background: #dcfce7; color: #15803d; }
        .badge-non { background: #fee2e2; color: #b91c1c; }
        
        #drop-zone { border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 15px; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Análise de Performance OTD</h1>
        <label class="btn-upload">
            Subir Planilha Excel
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
        </label>
    </div>

    <div id="drop-zone">Arraste a planilha "Cronograma de OTD - Base.xlsx" aqui ou clique no botão acima.</div>

    <div id="dashboard-content" class="hidden">
        <div class="filter-section">
            <div class="filter-group">
                <label>Relação em Análise</label>
                <select id="selectMode" onchange="processData()">
                    <option value="REL_ANUAL_SEM">Anual 26 X Semestral 26</option>
                    <option value="REL_ULT_ANUAL">Última Lubrificação 25 X Anual 26</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Complexo</label>
                <select id="selectComplexo" onchange="processData()">
                    <option value="TODOS">Todos os Complexos</option>
                </select>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card active" id="card-ALL" onclick="setFilter('ALL')">
                <div class="stat-label">Total de Ativos</div>
                <div class="stat-value" id="qtyTotal">0</div>
            </div>
            <div class="stat-card" id="card-OK" onclick="setFilter('OK')">
                <div class="stat-label">OTD Compliant</div>
                <div class="stat-value" id="qtyOk" style="color: var(--success)">0</div>
            </div>
            <div class="stat-card" id="card-ERR" onclick="setFilter('ERR')">
                <div class="stat-label">OTD Non-Compliant</div>
                <div class="stat-value" id="qtyError" style="color: var(--danger)">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Aderência</div>
                <div class="stat-value" id="otdScore" style="color: var(--accent)">0%</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="card">
                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>Complexo</th>
                                <th>Equipamento / TAG</th>
                                <th id="th-d1">Data A</th>
                                <th id="th-d2">Data B</th>
                                <th>Dias</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <canvas id="chartStatus"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let currentFilter = 'ALL';
    let myChart = null;

    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = evt.target.result;
            const workbook = XLSX.read(data, { type: 'binary', cellDates: true });
            const sheet = workbook.Sheets["Cálculos & Comparação"];
            if(!sheet) { alert("Aba 'Cálculos & Comparação' não encontrada!"); return; }
            
            rawData = XLSX.utils.sheet_to_json(sheet);
            setupComplexoFilter();
            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            processData();
        };
        reader.readAsBinaryString(file);
    }

    function setupComplexoFilter() {
        const select = document.getElementById('selectComplexo');
        const complexos = [...new Set(rawData.map(item => item["Complexo"]))].filter(Boolean);
        
        select.innerHTML = '<option value="TODOS">Todos os Complexos</option>';
        complexos.sort().forEach(c => {
            select.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    function processData() {
        const mode = document.getElementById('selectMode').value;
        const complexoSel = document.getElementById('selectComplexo').value;
        const body = document.getElementById('tableBody');
        body.innerHTML = "";

        // Configuração de Colunas baseado no modo
        const conf = mode === 'REL_ANUAL_SEM' ? 
            { d1: "Próxima Planejada - Anual Lubrificação 26", d2: "Próxima Planejada - Semestral 26", dias: "DIAS(OTD ANUAL X SEMESTRAL)26", status: "STATUS(OTD ANUAL X SEMESTRAL)26" } :
            { d1: "Última Lubrificação 25 Semestral", d2: "Próxima Planejada - Anual Lubrificação 26", dias: "DIAS(OTD ULTIMA X PROXIMA)", status: "OTD(ULTIMA LUBRIF X PRÓXIMA LUBRI)" };

        document.getElementById('th-d1').innerText = mode === 'REL_ANUAL_SEM' ? "Anual 26" : "Última 25";
        document.getElementById('th-d2').innerText = mode === 'REL_ANUAL_SEM' ? "Semestral 26" : "Anual 26";

        let okCount = 0;
        let errCount = 0;
        let filteredCount = 0;

        rawData.forEach(row => {
            // Filtro de Complexo
            if (complexoSel !== "TODOS" && row["Complexo"] !== complexoSel) return;

            const isOk = row[conf.status] === "OTD COMPLIANT";
            if (isOk) okCount++; else errCount++;
            filteredCount++;

            if (currentFilter === 'ALL' || (currentFilter === 'OK' && isOk) || (currentFilter === 'ERR' && !isOk)) {
                body.innerHTML += `
                    <tr>
                        <td style="color:#64748b; font-weight:600">${row["Complexo"] || '-'}</td>
                        <td><b>${row["TAG"]}</b><br><small>${row["Equipamento"]}</small></td>
                        <td>${formatDate(row[conf.d1])}</td>
                        <td>${formatDate(row[conf.d2])}</td>
                        <td><b>${row[conf.dias] || 0}</b></td>
                        <td><span class="badge ${isOk ? 'badge-compliant' : 'badge-non'}">${row[conf.status]}</span></td>
                    </tr>
                `;
            }
        });

        document.getElementById('qtyTotal').innerText = filteredCount;
        document.getElementById('qtyOk').innerText = okCount;
        document.getElementById('qtyError').innerText = errCount;
        document.getElementById('otdScore').innerText = filteredCount > 0 ? Math.round((okCount/filteredCount)*100) + "%" : "0%";
        updateChart(okCount, errCount);
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+f).classList.add('active');
        processData();
    }

    function formatDate(v) {
        if (!v) return "-";
        if (v instanceof Date) return v.toLocaleDateString('pt-BR');
        return v;
    }

    function updateChart(ok, err) {
        const ctx = document.getElementById('chartStatus').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Compliant', 'Non-Compliant'],
                datasets: [{ data: [ok, err], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }]
            },
            options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } }
        });
    }
</script>
</body>
</html>
